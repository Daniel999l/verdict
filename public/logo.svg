<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 452 94" width="452" height="94" role="img" aria-label="Verdict logo">
  <!-- Neobrutal offset shadow -->
  <rect x="8" y="8" width="438" height="80" fill="#000000"/>

  <!-- Card background -->
  <rect x="0" y="0" width="438" height="80" fill="#f9f9f9"/>

  <!-- Left black accent block -->
  <rect x="0" y="0" width="82" height="80" fill="#000000"/>

  <!-- V lettermark in electric blue (single polygon tracing the outer V shape) -->
  <polygon points="10,12 26,12 41,68 56,12 72,12 41,80" fill="#0040e0"/>

  <!-- Card border -->
  <rect x="0" y="0" width="438" height="80" fill="none" stroke="#000000" stroke-width="3"/>

  <!-- Divider line -->
  <line x1="82" y1="0" x2="82" y2="80" stroke="#000000" stroke-width="3"/>

  <!-- VERDICT wordmark -->
  <text
    x="260"
    y="51"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="40"
    font-weight="900"
    fill="#000000"
    text-anchor="middle">VERDICT</text>

  <!-- Subtitle -->
  <text
    x="260"
    y="67"
    font-family="'Courier New', Courier, monospace"
    font-size="9"
    font-weight="700"
    fill="#555555"
    text-anchor="middle"
    letter-spacing="3.5">AI PRODUCT REVIEW PANEL</text>
</svg>
